<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Violet Chat</title>
<link rel="stylesheet" href="style.css?v=1" />
</head>
<body>

<div class="app-shell">
  <div class="phone-frame">

    <header class="topbar">
      <button class="icon-button">‹</button>

      <button class="contact-button" id="openAvatar">
        <img src="assets/avatar.png" class="avatar"/>
      </button>

      <div class="contact-meta">
        <div class="contact-name">Неизвестный</div>
        <div class="contact-status" id="statusText">в сети</div>
      </div>

      <button class="icon-button">i</button>
    </header>

    <main id="chatArea" class="chat-area"></main>

    <div id="typingRow" class="typing-row hidden">
      <div class="typing-bubble"><span></span><span></span><span></span></div>
    </div>

    <form id="composerForm" class="composer">
      <input id="messageInput" placeholder="сообщение"/>
      <button id="sendBtn">↑</button>
    </form>

  </div>
</div>

<div id="avatarModal" class="avatar-modal hidden">
  <div id="closeAvatar" class="avatar-backdrop"></div>
  <div class="avatar-panel">
    <div class="zoom-stage">
      <img src="assets/mazeratti.jpg" id="zoomImage" class="zoom-image"/>
    </div>
  </div>
</div>

<script src="script.js?v=22"></script>
</body>
</html>
